name: flutter_application_chat
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Phiên bản ổn định tương thích
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.5
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.8
  firebase_analytics: ^11.3.9
  firebase_messaging: ^15.1.9
  file_picker: ^8.1.2

  # Authentication
  google_sign_in: ^6.2.2
  
  # Payment
  in_app_purchase: ^3.2.3
  flutter_stripe: ^12.3.0
  
  # UI & Image
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  image_picker: ^1.0.7
  http: ^1.2.0
  timeago: ^3.5.0

  # State Management
  provider: ^6.1.2
  
  # Utilities
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.0
  url_launcher: ^6.3.1
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true